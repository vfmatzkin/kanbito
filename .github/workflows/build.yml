name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            artifact_name: Kanbito-Linux
            asset_ext: .tar.gz
          - os: macos-latest
            name: macOS
            artifact_name: Kanbito-macOS
            asset_ext: .dmg
          - os: windows-latest
            name: Windows
            artifact_name: Kanbito-Windows
            asset_ext: .zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Ubuntu 24.04+ uses webkit2gtk-4.1, older versions use 4.0
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

      - name: Build and package
        run: python scripts/build.py --package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}${{ matrix.asset_ext }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Kanbito-Linux/Kanbito-Linux.tar.gz
            artifacts/Kanbito-macOS/Kanbito-macOS.dmg
            artifacts/Kanbito-Windows/Kanbito-Windows.zip
          generate_release_notes: true
